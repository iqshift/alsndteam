name: driver_app
description: Restaurant on-demand delivery driver app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7
  # Utils
  url_launcher: ^6.2.2
  uuid: ^4.2.1
  json_annotation: ^4.8.1
  mobile_scanner: ^3.5.6
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
