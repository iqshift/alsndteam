name: restaurant_app
description: Restaurant on-demand delivery restaurant app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.1.0
  # Utils
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
